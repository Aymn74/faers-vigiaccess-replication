name: Reproduce FAERS Check

on:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FAERS replication check
        env:
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: python src/faers_check.py

      - name: Upload generated outputs
        uses: actions/upload-artifact@v4
        with:
          name: faers-replication-output
          path: |
            data/*.csv
            data/*.json
            reports/*.md
